---

services:
  cg_server:
    build: 
      context: .
      dockerfile: Containerfile
    container_name: CaptionGlassesServer
    ports:
      - "2001:2001"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - PHRASE_TIMEOUT=${PHRASE_TIMEOUT}
      - MAX_DURATION=${MAX_DURATION}
      - VAD_THRESHOLD=${VAD_THRESHOLD}

